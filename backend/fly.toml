app = "mission-control-backend"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"
  HOST = "0.0.0.0"
  CORS_ORIGINS = "https://jbtdc24.github.io"
  DATA_DIR = "/data"

[mounts]
  source = "mission_control_data"
  destination = "/data"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
